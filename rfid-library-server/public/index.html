<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📚 Library Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
  <div class="container my-4">
    <h1 class="text-center mb-4">📚 Library Management Dashboard</h1>

    <ul class="nav nav-tabs" id="tabMenu">
      <li class="nav-item"><a class="nav-link active" href="#" id="tabIssued">Issued Books</a></li>
      <li class="nav-item"><a class="nav-link" href="#" id="tabLogs">Entry/Exit Logs</a></li>
      <li class="nav-item"><a class="nav-link" href="#" id="tabInside">Currently Inside</a></li>
    </ul>

    <div class="tab-content mt-4">
      <!-- Issued Books -->
      <div id="sectionIssued">
        <h3>📘 Issued Books</h3>
        <table class="table table-striped" id="issuedTable">
          <thead class="table-dark">
            <tr>
              <th>Student Name</th>
              <th>Book Title</th>
              <th>Borrow Date</th>
              <th>Due Date</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <!-- Entry/Exit Logs -->
      <div id="sectionLogs" class="d-none">
        <h3>🧍 Entry/Exit Logs</h3>
        <table class="table table-striped" id="logTable">
          <thead class="table-dark">
            <tr>
              <th>Roll No</th>
              <th>Name</th>
              <th>Department</th>
              <th>Entry Time</th>
              <th>Exit Time</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <!-- Currently Inside -->
      <div id="sectionInside" class="d-none">
        <h3>🟢 Students Currently Inside</h3>
        <ul class="list-group" id="insideList"></ul>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
